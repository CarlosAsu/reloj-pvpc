<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Visualiza el precio de la electricidad PVPC en España en un reloj de 24 horas con gráfico radial de tarifas por hora.">
<meta name="theme-color" content="#0b1120">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Reloj PVPC — Precio de la luz en España hoy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --clock-size: min(92vw, 480px);
  --bg: #0b1120;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.07);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --accent: #38bdf8;
  --green: rgb(34,197,94);
  --yellow: rgb(234,179,8);
  --orange: rgb(249,115,22);
  --red: rgb(239,68,68);
  --tt-h-mobile: 100px; /* reserved space for mobile tooltip */
  --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

@media (min-width: 600px)  { :root { --clock-size: min(68vw, 520px); } }
@media (min-width: 960px)  { :root { --clock-size: 520px; } }
@media (max-width: 359px)  { :root { --clock-size: 96vw; } }

html, body {
  width: 100%; min-height: 100dvh;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 70%, rgba(99,102,241,0.04) 0%, transparent 60%);
  color: var(--text);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 12px 0;
  /* Bottom padding added dynamically on mobile via JS */
}

/* ─── APP WRAPPER ────────────────────────────────────────────────────── */
#app {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding-bottom: 24px;
}

/* ─── WARNING BANNER ─────────────────────────────────────────────────── */
#api-warning {
  display: none;
  background: rgba(234,179,8,0.12);
  border: 1px solid rgba(234,179,8,0.3);
  color: rgb(234,179,8);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  letter-spacing: 0.02em;
}

/* ─── CLOCK WRAPPER ──────────────────────────────────────────────────── */
.clock-wrapper {
  position: relative;
  width: var(--clock-size);
  height: var(--clock-size);
  flex-shrink: 0;
}

#clock-svg {
  width: 100%;
  height: 100%;
  display: block;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  overflow: visible;
}

/* ─── TOMORROW OVERLAY ───────────────────────────────────────────────── */
#tomorrow-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(11,17,32,0.82);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px;
  font-size: clamp(13px, 3.5vw, 15px);
  font-weight: 500;
  color: rgba(226,232,240,0.85);
  line-height: 1.6;
}

/* ─── MODE BUTTONS ───────────────────────────────────────────────────── */
.mode-buttons {
  display: flex;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  padding: 3px;
  gap: 2px;
}

.btn-mode {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 22px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
}

.btn-mode.active {
  background: rgba(56,189,248,0.15);
  color: var(--accent);
  box-shadow: 0 0 0 1px rgba(56,189,248,0.2);
}

.btn-mode:not(.active):hover {
  color: var(--text);
  background: rgba(255,255,255,0.04);
}

/* ─── INFO PANEL ─────────────────────────────────────────────────────── */
.info-panel {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color 0.2s;
}

.card-full {
  grid-column: 1 / -1;
  align-items: center;
  padding: 10px 16px;
}

.card .label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.card .range {
  font-size: 11px;
  color: rgba(148,163,184,0.8);
  font-weight: 400;
}

.card .price {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.card .date-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  text-transform: capitalize;
}

.green { color: var(--green); }
.yellow { color: var(--yellow); }
.red { color: var(--red); }

@media (min-width: 600px) {
  .info-panel {
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  }
}

@media (min-width: 960px) {
  .info-panel {
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  }
  .card-full {
    grid-column: 1;
  }
}

/* ─── DESKTOP TOOLTIP ────────────────────────────────────────────────── */
#tooltip-desktop {
  display: none;
  position: fixed;
  z-index: 1000;
  pointer-events: none;
  background: rgba(15,23,42,0.96);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  min-width: 160px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* ─── MOBILE TOOLTIP (FIXED BOTTOM — RESERVED SPACE) ────────────────── */
#tooltip-mobile {
  display: none; /* shown via JS on touch devices */
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  z-index: 1000;
  background: rgba(15,23,42,0.97);
  border-top: 1px solid rgba(56,189,248,0.15);
  padding: 14px 20px 20px;
  min-height: var(--tt-h-mobile);
  text-align: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}

#tooltip-mobile.visible {
  transform: translateY(0);
}

#tooltip-mobile.always-shown {
  transform: translateY(0);
}

/* ─── TOOLTIP CONTENT ─────────────────────────────────────────────────── */
.tt-range {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.tt-price {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

#tooltip-desktop .tt-price { font-size: 16px; }

.tt-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 4px;
}

.badge-cheap  { background: rgba(34,197,94,0.15);  color: var(--green); }
.badge-mid    { background: rgba(234,179,8,0.15);  color: var(--yellow); }
.badge-expensive { background: rgba(239,68,68,0.15); color: var(--red); }

.tt-hint {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 400;
  padding-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.tt-hint::before {
  content: '👆';
  font-size: 14px;
}

/* ─── SVG WEDGE ANIMATIONS ───────────────────────────────────────────── */
@keyframes wedge-pulse {
  0%, 100% { opacity: 0.88; }
  50%       { opacity: 1.0; }
}

.wedge-current {
  animation: wedge-pulse 2s ease-in-out infinite;
}

/* ─── LANDSCAPE MOBILE ───────────────────────────────────────────────── */
@media (max-height: 500px) and (orientation: landscape) {
  body { padding: 8px 12px 0; }
  #app {
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 12px;
  }
  .clock-wrapper {
    --clock-size: min(44vh, 380px);
    width: var(--clock-size);
    height: var(--clock-size);
    flex-shrink: 0;
  }
  .right-panel {
    flex: 1;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .info-panel {
    grid-template-columns: 1fr 1fr;
  }
}

/* ─── LOADING SKELETON ───────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { opacity: 0.3; }
  50%  { opacity: 0.7; }
  100% { opacity: 0.3; }
}

.skeleton {
  animation: shimmer 1.5s ease-in-out infinite;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  height: 14px;
  width: 80%;
}

/* ─── SCROLLBAR ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<div id="app">
  <div id="api-warning">⚠️ Mostrando datos de ejemplo</div>

  <!-- CLOCK -->
  <div class="clock-wrapper">
    <svg id="clock-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reloj PVPC 24 horas">
      <defs>
        <!-- Background gradient -->
        <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
          <stop offset="0%"   stop-color="#1e293b"/>
          <stop offset="100%" stop-color="#0b1120"/>
        </radialGradient>

        <!-- Outer ring gradient -->
        <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
          <stop offset="85%" stop-color="transparent"/>
          <stop offset="100%" stop-color="rgba(56,189,248,0.06)"/>
        </radialGradient>

        <!-- Glow filter for current hour wedge -->
        <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Drop shadow for hands -->
        <filter id="handShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="rgba(0,0,0,0.7)"/>
        </filter>
      </defs>

      <!-- Layer 0: Background -->
      <g id="layer-bg">
        <!-- Main clock face -->
        <circle cx="300" cy="300" r="272" fill="url(#bgGrad)" stroke="rgba(148,163,184,0.08)" stroke-width="1"/>
        <!-- Subtle outer glow ring -->
        <circle cx="300" cy="300" r="272" fill="url(#ringGrad)"/>
      </g>

      <!-- Layer 1: Wedges (built by JS) -->
      <g id="layer-wedges"></g>

      <!-- Layer 2: Inner mask circle (hides wedge cores) -->
      <circle cx="300" cy="300" r="15" fill="#0b1120"/>

      <!-- Layer 3: Tick marks & labels (built by JS) -->
      <g id="layer-marks"></g>

      <!-- Layer 4: Hands -->
      <g id="layer-hands">
        <!-- Hour hand (24h) — points up at 0 rotation, rotate = hour*15 degrees -->
        <g id="hand-hour" transform="rotate(0,300,300)" filter="url(#handShadow)">
          <!-- Tail -->
          <line x1="300" y1="300" x2="300" y2="330"
                stroke="rgba(226,232,240,0.45)" stroke-width="5.5" stroke-linecap="round"/>
          <!-- Main arm -->
          <line x1="300" y1="300" x2="300" y2="148"
                stroke="#e2e8f0" stroke-width="5.5" stroke-linecap="round"/>
        </g>

        <!-- Minute hand — rotate = minute*6 degrees -->
        <g id="hand-minute" transform="rotate(0,300,300)" filter="url(#handShadow)">
          <!-- Tail -->
          <line x1="300" y1="300" x2="300" y2="322"
                stroke="rgba(226,232,240,0.35)" stroke-width="2.8" stroke-linecap="round"/>
          <!-- Main arm -->
          <line x1="300" y1="300" x2="300" y2="116"
                stroke="rgba(226,232,240,0.9)" stroke-width="2.8" stroke-linecap="round"/>
        </g>

        <!-- Center decorative dot -->
        <circle cx="300" cy="300" r="7" fill="#0b1120" stroke="#38bdf8" stroke-width="2.5"/>
        <circle cx="300" cy="300" r="3" fill="#38bdf8"/>
      </g>
    </svg>

    <!-- Tomorrow overlay -->
    <div id="tomorrow-overlay">
      Los precios de mañana se publican a partir de las&nbsp;<strong>20:15h</strong>&nbsp;aproximadamente.
    </div>
  </div>

  <!-- MODE BUTTONS -->
  <div class="mode-buttons">
    <button id="btn-today"    class="btn-mode active">Hoy</button>
    <button id="btn-tomorrow" class="btn-mode">Mañana</button>
  </div>

  <!-- INFO PANEL -->
  <div class="info-panel">
    <div id="panel-date"      class="card card-full"><span class="date-text skeleton">&nbsp;</span></div>
    <div id="panel-cheap"     class="card"><span class="label">Hora más barata</span><span class="range skeleton">&nbsp;</span><span class="price green skeleton">&nbsp;</span></div>
    <div id="panel-expensive" class="card"><span class="label">Hora más cara</span><span class="range skeleton">&nbsp;</span><span class="price red skeleton">&nbsp;</span></div>
    <div id="panel-avg"       class="card"><span class="label">Precio medio</span><span class="price yellow skeleton">&nbsp;</span></div>
    <div id="panel-current"   class="card"><span class="label">Precio actual</span><span class="range skeleton">&nbsp;</span><span class="price skeleton">&nbsp;</span></div>
  </div>
</div>

<!-- DESKTOP TOOLTIP -->
<div id="tooltip-desktop"></div>

<!-- MOBILE TOOLTIP (fixed bottom, reserved space) -->
<div id="tooltip-mobile">
  <div class="tt-hint">Toca una franja horaria para ver su precio</div>
</div>

<noscript>
  <style>body{display:flex;align-items:center;justify-content:center;height:100vh;}</style>
  <p style="color:#94a3b8;font-family:sans-serif;text-align:center">Esta aplicación requiere JavaScript para funcionar.</p>
</noscript>

<script>
(function () {
  'use strict';

  /* ────────────────────────────────────────────────────────────────────
     CONSTANTS
  ─────────────────────────────────────────────────────────────────── */
  const CX = 300, CY = 300;
  const R_INNER        = 16;   // wedge inner radius
  const R_MIN          = 68;   // min outer radius (cheapest hour)
  const R_MAX          = 210;  // max outer radius (most expensive)
  const R_HIT          = R_MAX + 22; // invisible hit area outer radius
  const R_MARK_I_MINOR = 220;  // minor tick inner
  const R_MARK_O_MINOR = 228;  // minor tick outer
  const R_MARK_I_MAJOR = 213;  // major tick inner
  const R_MARK_O_MAJOR = 233;  // major tick outer
  const R_LABEL        = 250;  // hour numbers radius
  const GAP_DEG        = 1.4;  // gap between wedges (degrees)
  const WEDGE_DEG      = 15 - GAP_DEG; // each wedge angular width

  const COLOR_STOPS = [
    [0,    [34,  197, 94 ]],
    [0.33, [234, 179, 8  ]],
    [0.66, [249, 115, 22 ]],
    [1,    [239, 68,  68 ]],
  ];

  const API_URL = 'https://api.preciodelaluz.org/v1/prices/all?zone=PCB';
  const PROXY1  = 'https://api.allorigins.win/raw?url=';
  const PROXY2  = 'https://corsproxy.io/?url=';
  const TIMEOUT = 6000;

  /* ────────────────────────────────────────────────────────────────────
     STATE
  ─────────────────────────────────────────────────────────────────── */
  const state = {
    prices:      null,  // array[24]
    stats:       null,  // {min,max,avg,cheapIdx,expIdx}
    mode:        'today',
    activeWedge: null,  // hour index or null
    lastHour:    -1,
  };

  /* ────────────────────────────────────────────────────────────────────
     DOM REFS
  ─────────────────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const svgEl          = $('clock-svg');
  const layerWedges    = $('layer-wedges');
  const layerMarks     = $('layer-marks');
  const handHour       = $('hand-hour');
  const handMinute     = $('hand-minute');
  const ttDesktop      = $('tooltip-desktop');
  const ttMobile       = $('tooltip-mobile');
  const btnToday       = $('btn-today');
  const btnTomorrow    = $('btn-tomorrow');
  const panelDate      = $('panel-date');
  const panelCheap     = $('panel-cheap');
  const panelExp       = $('panel-expensive');
  const panelAvg       = $('panel-avg');
  const panelCurrent   = $('panel-current');
  const apiWarning     = $('api-warning');
  const tomorrowOvl    = $('tomorrow-overlay');

  /* ────────────────────────────────────────────────────────────────────
     DEVICE DETECTION
  ─────────────────────────────────────────────────────────────────── */
  const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  // Show mobile tooltip on touch devices and reserve space
  if (IS_TOUCH) {
    ttMobile.style.display = 'block';
    ttMobile.classList.add('always-shown');
    // Reserve space at the bottom so content isn't hidden
    const reservedPx = parseInt(getComputedStyle(document.documentElement)
      .getPropertyValue('--tt-h-mobile')) || 100;
    document.body.style.paddingBottom = (reservedPx + 16) + 'px';
  }

  /* ────────────────────────────────────────────────────────────────────
     HELPERS
  ─────────────────────────────────────────────────────────────────── */
  function madridNow() {
    return new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Madrid' }));
  }

  function toRad(deg) { return deg * Math.PI / 180; }

  function polar(r, deg) {
    const a = toRad(deg);
    return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
  }

  function svgEl2(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function wedgePath(rIn, rOut, startDeg, endDeg) {
    const p1 = polar(rIn,  startDeg);
    const p2 = polar(rOut, startDeg);
    const p3 = polar(rOut, endDeg);
    const p4 = polar(rIn,  endDeg);
    const lg = (endDeg - startDeg) > 180 ? 1 : 0;
    return [
      `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`,
      `L ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`,
      `A ${rOut} ${rOut} 0 ${lg} 1 ${p3.x.toFixed(2)} ${p3.y.toFixed(2)}`,
      `L ${p4.x.toFixed(2)} ${p4.y.toFixed(2)}`,
      `A ${rIn}  ${rIn}  0 ${lg} 0 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`,
      'Z'
    ].join(' ');
  }

  function lerpColor(ratio) {
    for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
      const [t0, c0] = COLOR_STOPS[i];
      const [t1, c1] = COLOR_STOPS[i + 1];
      if (ratio <= t1) {
        const t = (ratio - t0) / (t1 - t0);
        return c0.map((v, j) => Math.round(v + t * (c1[j] - v)));
      }
    }
    return COLOR_STOPS[COLOR_STOPS.length - 1][1];
  }

  function rgb(arr, a = 1) { return `rgba(${arr[0]},${arr[1]},${arr[2]},${a})`; }

  function fmtPrice(p) { return p.toFixed(5) + ' €/kWh'; }

  function fmtRange(h) {
    const pad = n => String(n).padStart(2, '0');
    return `${pad(h)}:00 – ${pad((h + 1) % 24)}:00`;
  }

  function priceRatio(price, min, max) {
    return max > min ? Math.max(0, Math.min(1, (price - min) / (max - min))) : 0;
  }

  function badgeInfo(ratio) {
    if (ratio < 0.34) return ['BARATA',    'badge-cheap'];
    if (ratio < 0.66) return ['MEDIA',     'badge-mid'];
    return               ['CARA',      'badge-expensive'];
  }

  /* ────────────────────────────────────────────────────────────────────
     API — FALLBACK CHAIN
  ─────────────────────────────────────────────────────────────────── */
  async function fetchTimeout(url) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT);
    try {
      const res = await fetch(url, { signal: ctrl.signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } finally {
      clearTimeout(timer);
    }
  }

  async function loadPrices() {
    const attempts = [
      () => fetchTimeout(API_URL),
      () => fetchTimeout(PROXY1 + encodeURIComponent(API_URL)),
      () => fetchTimeout(PROXY2 + encodeURIComponent(API_URL)),
    ];

    for (let i = 0; i < attempts.length; i++) {
      try {
        const data = await attempts[i]();
        console.log(`✅ API cargada (intento ${i + 1})`);
        return parseApi(data);
      } catch (e) {
        console.log(`❌ Intento ${i + 1} fallido:`, e.message);
      }
    }

    console.log('⚠️ Usando datos de ejemplo hardcodeados');
    apiWarning.style.display = 'block';
    return fallbackData();
  }

  function parseApi(data) {
    const out = [];
    for (let h = 0; h < 24; h++) {
      const key = `${String(h).padStart(2,'0')}-${String(h+1).padStart(2,'0')}`;
      const alt = `${h}-${h+1}`;
      const entry = data[key] || data[alt] || null;
      out.push({
        hour:     h,
        price:    entry ? entry.price / 1000 : 0.1,
        cheap:    entry ? (entry['is-cheap']     || false) : false,
        underAvg: entry ? (entry['is-under-avg'] || false) : false,
      });
    }
    return out;
  }

  function fallbackData() {
    // Realistic Spanish PVPC curve (€/MWh × 1000 for €/kWh)
    const raw = [
      42, 38, 35, 33, 34, 40, 62, 92, 115, 122, 118, 114,
      108, 103, 98, 95, 100, 118, 138, 148, 130, 112, 88, 60
    ];
    return raw.map((v, h) => ({
      hour: h, price: v / 1000,
      cheap: v < 55, underAvg: v < 100,
    }));
  }

  /* ────────────────────────────────────────────────────────────────────
     STATS
  ─────────────────────────────────────────────────────────────────── */
  function computeStats(prices) {
    const vals = prices.map(p => p.price);
    const min  = Math.min(...vals);
    const max  = Math.max(...vals);
    const avg  = vals.reduce((a, b) => a + b, 0) / vals.length;
    return { min, max, avg, cheapIdx: vals.indexOf(min), expIdx: vals.indexOf(max) };
  }

  /* ────────────────────────────────────────────────────────────────────
     BUILD: MARKS & LABELS
  ─────────────────────────────────────────────────────────────────── */
  function buildMarksAndLabels() {
    layerMarks.innerHTML = '';
    for (let h = 0; h < 24; h++) {
      const isMajor = h % 6 === 0;
      const angle   = -90 + h * 15; // -90 = top, clockwise

      // Tick mark
      const rI = isMajor ? R_MARK_I_MAJOR : R_MARK_I_MINOR;
      const rO = isMajor ? R_MARK_O_MAJOR : R_MARK_O_MINOR;
      const p1 = polar(rI, angle);
      const p2 = polar(rO, angle);
      layerMarks.appendChild(svgEl2('line', {
        x1: p1.x.toFixed(2), y1: p1.y.toFixed(2),
        x2: p2.x.toFixed(2), y2: p2.y.toFixed(2),
        stroke: isMajor ? 'rgba(148,163,184,0.85)' : 'rgba(148,163,184,0.35)',
        'stroke-width': isMajor ? 2.2 : 1.0,
        'stroke-linecap': 'round',
      }));

      // Hour label — always horizontal
      const lp = polar(R_LABEL, angle);
      const txt = svgEl2('text', {
        x: lp.x.toFixed(2),
        y: lp.y.toFixed(2),
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        fill:          isMajor ? 'rgba(226,232,240,0.92)' : 'rgba(100,116,139,0.75)',
        'font-size':   isMajor ? '14' : '9.5',
        'font-weight': isMajor ? '600' : '400',
        'font-family': 'Inter, sans-serif',
      });
      txt.textContent = h;
      layerMarks.appendChild(txt);
    }
  }

  /* ────────────────────────────────────────────────────────────────────
     BUILD: WEDGES
  ─────────────────────────────────────────────────────────────────── */
  function buildWedges() {
    layerWedges.innerHTML = '';
    if (!state.prices) return;
    const { min, max } = state.stats;

    state.prices.forEach(({ hour, price }) => {
      const ratio  = priceRatio(price, min, max);
      const col    = lerpColor(ratio);
      const start  = -90 + hour * 15 + GAP_DEG / 2;
      const end    = start + WEDGE_DEG;
      const rOuter = R_MIN + ratio * (R_MAX - R_MIN);

      // Visible wedge
      const vis = svgEl2('path', {
        d:          wedgePath(R_INNER, rOuter, start, end),
        fill:       rgb(col, 0.7),
        class:      'wedge',
        'data-hour':  hour,
        'data-ratio': ratio.toFixed(4),
        'data-price': price.toFixed(5),
      });
      layerWedges.appendChild(vis);

      // Invisible hit area (larger, for easy touch)
      const hit = svgEl2('path', {
        d:          wedgePath(R_INNER, R_HIT, start, end),
        fill:       'transparent',
        class:      'wedge-hit',
        cursor:     'pointer',
        'data-hour': hour,
      });
      layerWedges.appendChild(hit);
    });

    attachWedgeEvents();
    highlightCurrentHour();
  }

  /* ────────────────────────────────────────────────────────────────────
     HIGHLIGHT CURRENT HOUR
  ─────────────────────────────────────────────────────────────────── */
  function highlightCurrentHour() {
    if (!state.prices || state.mode !== 'today') return;
    const h = madridNow().getHours();
    layerWedges.querySelectorAll('.wedge').forEach(w => {
      const wh = parseInt(w.dataset.hour);
      if (wh === h) {
        w.setAttribute('opacity', '0.95');
        w.setAttribute('filter', 'url(#glowFilter)');
        w.classList.add('wedge-current');
      } else {
        w.setAttribute('opacity', '0.7');
        w.removeAttribute('filter');
        w.classList.remove('wedge-current');
      }
    });
  }

  function clearHighlight() {
    layerWedges.querySelectorAll('.wedge').forEach(w => {
      w.setAttribute('opacity', '0.7');
      w.removeAttribute('filter');
      w.classList.remove('wedge-current');
    });
  }

  /* ────────────────────────────────────────────────────────────────────
     EVENTS: WEDGE INTERACTIONS
  ─────────────────────────────────────────────────────────────────── */
  function attachWedgeEvents() {
    const hits = layerWedges.querySelectorAll('.wedge-hit');

    if (IS_TOUCH) {
      hits.forEach(hit => {
        hit.addEventListener('touchstart', onWedgeTouch, { passive: false });
      });
      // Close on touch outside clock
      document.addEventListener('touchstart', onOutsideTouch, { passive: true });
    } else {
      hits.forEach(hit => {
        hit.addEventListener('mouseenter', onWedgeEnter);
        hit.addEventListener('mousemove',  onWedgeMove);
        hit.addEventListener('mouseleave', onWedgeLeave);
      });
    }
  }

  function onWedgeTouch(e) {
    e.preventDefault();
    e.stopPropagation();
    const h = parseInt(this.dataset.hour);
    if (state.activeWedge === h) {
      // Same wedge → close
      state.activeWedge = null;
      hideMobileTooltip();
    } else {
      state.activeWedge = h;
      showMobileTooltip(h);
    }
  }

  function onOutsideTouch(e) {
    if (svgEl.contains(e.target) || ttMobile.contains(e.target)) return;
    state.activeWedge = null;
    hideMobileTooltip();
  }

  function onWedgeEnter(e) {
    const h = parseInt(this.dataset.hour);
    showDesktopTooltip(h, e);
  }

  function onWedgeMove(e) {
    // Keep tooltip near cursor, stay inside viewport
    let left = e.clientX + 16;
    let top  = e.clientY - 12;
    const tw = ttDesktop.offsetWidth  || 180;
    const th = ttDesktop.offsetHeight || 90;
    if (left + tw > window.innerWidth  - 8) left = e.clientX - tw - 16;
    if (top  + th > window.innerHeight - 8) top  = e.clientY - th - 12;
    ttDesktop.style.left = left + 'px';
    ttDesktop.style.top  = top  + 'px';
  }

  function onWedgeLeave() {
    ttDesktop.style.display = 'none';
  }

  /* ────────────────────────────────────────────────────────────────────
     TOOLTIPS
  ─────────────────────────────────────────────────────────────────── */
  function tooltipHTML(h) {
    if (!state.prices || !state.stats) return '';
    const p     = state.prices[h];
    const ratio = priceRatio(p.price, state.stats.min, state.stats.max);
    const col   = lerpColor(ratio);
    const [bTxt, bCls] = badgeInfo(ratio);
    return `
      <div class="tt-range">${fmtRange(h)}</div>
      <div class="tt-price" style="color:rgb(${col.join(',')})">${fmtPrice(p.price)}</div>
      <div class="tt-badge ${bCls}">${bTxt}</div>
    `;
  }

  function showDesktopTooltip(h, e) {
    ttDesktop.innerHTML = tooltipHTML(h);
    ttDesktop.style.display = 'block';
    // Position will be refined on mousemove
    ttDesktop.style.left = (e.clientX + 16) + 'px';
    ttDesktop.style.top  = (e.clientY - 12) + 'px';
  }

  function showMobileTooltip(h) {
    ttMobile.innerHTML = tooltipHTML(h);
    ttMobile.classList.add('visible');
  }

  function hideMobileTooltip() {
    ttMobile.classList.remove('visible');
    // After transition, restore hint
    setTimeout(() => {
      if (!ttMobile.classList.contains('visible')) {
        ttMobile.innerHTML = '<div class="tt-hint">Toca una franja horaria para ver su precio</div>';
      }
    }, 280);
  }

  /* ────────────────────────────────────────────────────────────────────
     INFO PANEL
  ─────────────────────────────────────────────────────────────────── */
  function updatePanel() {
    if (!state.prices || !state.stats) return;
    const { prices, stats, mode } = state;
    const now = madridNow();

    // Date
    const dateStr = now.toLocaleDateString('es-ES', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    panelDate.innerHTML = `<span class="date-text">${dateStr.charAt(0).toUpperCase() + dateStr.slice(1)}</span>`;

    // Cheapest
    const cheap = prices[stats.cheapIdx];
    panelCheap.innerHTML = `
      <span class="label">Hora más barata</span>
      <span class="range">${fmtRange(cheap.hour)}</span>
      <span class="price green">${fmtPrice(cheap.price)}</span>`;

    // Most expensive
    const exp = prices[stats.expIdx];
    panelExp.innerHTML = `
      <span class="label">Hora más cara</span>
      <span class="range">${fmtRange(exp.hour)}</span>
      <span class="price red">${fmtPrice(exp.price)}</span>`;

    // Average
    panelAvg.innerHTML = `
      <span class="label">Precio medio</span>
      <span class="price yellow">${fmtPrice(stats.avg)}</span>`;

    // Current (today only)
    if (mode === 'today') {
      const h   = now.getHours();
      const cur = prices[h];
      const rat = priceRatio(cur.price, stats.min, stats.max);
      const col = lerpColor(rat);
      panelCurrent.style.display = '';
      panelCurrent.innerHTML = `
        <span class="label">Precio actual</span>
        <span class="range">${fmtRange(h)}</span>
        <span class="price" style="color:rgb(${col.join(',')})">${fmtPrice(cur.price)}</span>`;
    } else {
      panelCurrent.style.display = 'none';
    }
  }

  /* ────────────────────────────────────────────────────────────────────
     HANDS
  ─────────────────────────────────────────────────────────────────── */
  function updateHands() {
    if (state.mode !== 'today') return;
    const now = madridNow();
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();

    // Hour hand: 24h revolution — each hour = 15°, start at top (0° = midnight)
    const hourDeg = (h + m / 60 + s / 3600) * 15;
    // Minute hand: 360° in 60 min
    const minDeg  = (m + s / 60) * 6;

    handHour.setAttribute('transform',   `rotate(${hourDeg.toFixed(4)},${CX},${CY})`);
    handMinute.setAttribute('transform', `rotate(${minDeg.toFixed(4)},${CX},${CY})`);

    return h;
  }

  /* ────────────────────────────────────────────────────────────────────
     MODE BUTTONS
  ─────────────────────────────────────────────────────────────────── */
  function setMode(mode) {
    state.mode = mode;
    btnToday.classList.toggle('active',    mode === 'today');
    btnTomorrow.classList.toggle('active', mode === 'tomorrow');

    const handsLayer = document.getElementById('layer-hands');

    if (mode === 'tomorrow') {
      tomorrowOvl.style.display = 'flex';
      handsLayer.style.display  = 'none';
      clearHighlight();
    } else {
      tomorrowOvl.style.display = 'none';
      handsLayer.style.display  = '';
      updateHands();
      highlightCurrentHour();
    }

    // Close any open tooltip
    if (IS_TOUCH) {
      state.activeWedge = null;
      hideMobileTooltip();
    }

    updatePanel();
  }

  /* ────────────────────────────────────────────────────────────────────
     TICK (every second)
  ─────────────────────────────────────────────────────────────────── */
  function tick() {
    const h = updateHands();
    if (h !== state.lastHour) {
      state.lastHour = h;
      highlightCurrentHour();
      updatePanel();
    }
  }

  /* ────────────────────────────────────────────────────────────────────
     INIT
  ─────────────────────────────────────────────────────────────────── */
  async function init() {
    // Build static SVG elements
    buildMarksAndLabels();

    // Start clock ticking immediately (hands, no prices yet)
    updateHands();
    setInterval(tick, 1000);

    // Button listeners
    btnToday.addEventListener('click',    () => setMode('today'));
    btnTomorrow.addEventListener('click', () => setMode('tomorrow'));

    // Load prices
    state.prices = await loadPrices();
    state.stats  = computeStats(state.prices);

    // Build wedges
    buildWedges();
    updatePanel();
  }

  init();

})();
</script>
